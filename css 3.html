        body {
            background-color: rgb(173, 160, 160);
        }

        /* @media only screen and (max-width = 455px){

        img {
            float: right;
            border-radius: 15px;
            border: 3px solid red;
            box-shadow: -13px 9px 9px black;
        }

        .cards {
            background-color: aqua;
            padding: 5px;
            display: flow-root;

        }

        .card {
            border: 2px solid black;
            padding: 10px;
            margin: 5px;
            font-size: medium;
            text-shadow:  5px 5px 5px black;
        }
        .shadow{
            text-shadow:  5px 5px 5px black;
        }
    </style>
</head>
