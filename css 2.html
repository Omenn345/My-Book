<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        body{
            background-color: rgb(99, 98, 97);
        }
        .parent {
            margin: 50px;
            padding: 55px;
            width: 1155px;
            border: 2px solid black;
            background-color: darkgray;
            font-size: large;
        }

        .box {
            padding: 3px;
            margin: 3px;
            height: 133px;
            width: 1000px;
        }

        .box1 {
            border: 2px solid black;
            background-color: aqua;
            position: relative;
            top: 0px;
            width: 400px;
            z-index: 1;
        }

        .box2 {
            border: 2px solid black;
            background-color: bisque;
            position: relative;
            /* position: absolute; this means ye ab sidha border google ke form ko apna head samjega rather than parent ke border ko */
            /* top: 39px;
            left: 84px; */
        }

        .box3 {
            border: 2px solid black;
            background-color: coral;
            position: relative;
            /* top: 19px;
            left: 146px; */
        }

        .box4 {
            border: 2px solid black;
            background-color: gold;
            position: sticky;
            height: 100px;
            width: 100px;
            /* top: 300px; /* static rahega */
            /* left: 300px;  */
        }

        ul {
            display: flex;
            list-style: none;
        }

        li {
            text-decoration: underline;
            border: 2px solid rgb(156, 154, 154);
            position: relative;
            padding: 5px;
            margin: 15px;
            background-color: rgb(236, 211, 179);
            border-radius: 8px;
            left: 600px;
            font-size: 5vh;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1">box1</div>
        <div class="box box2">box2</div>
        <div class="box box3">box3</div>
        <div class="box box4">box4</div>
    </div>

    <div>
        <ul>
            <li>Home</li>
            <li>About Me</li>
            <li>Contact</li>
        </ul>
    </div>
</body>

</html>
