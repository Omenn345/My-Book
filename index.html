<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: burlywood;
        }
        nav{
            background-color: rgb(17, 230, 230);
            color: red;
            font-size: large;
            border: 5px solid black;

        }
        .size{

        a:visited{

        }
        a:hover{
            background-color: darkolivegreen;
        }
