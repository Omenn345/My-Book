<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <h1>Give your name</h1>
    <p>This is block element</p>
    <a href="http://Google">Google this is inline element</a>
    <!-- Inline ek hi line le leta badaaaa   block elements bada sa leta-->
    <form action="post">
        <div>
            <label for="ID">Username bta</label>
            <input button="text" id="Username" placeholder="Enter your name">
        </div>
        <input type="radio" name="gender" id="Male">
        <label for="Male">Male</label>
        <input type="radio" name="gender" id="Female">
        <label for="Female">Female</label>
        <div>
            <textarea name="" id="Comment" cols="30" rows="10" placeholder="Enter Your msg for me"></textarea>
        </div>
        <div>
            <select name="Fruits">
                <option value="Apple">Apple</option>
                <option value="Banana">Banana</option>
                <option value="Grape">Grape</option>
            </select>
        </div>
    </form>

</body>

</html>
